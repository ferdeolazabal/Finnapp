services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: trading_ai
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: change_me
    ports: ["5432:5432"]
    volumes: ["trading_ai_postgres:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading_ai"]
      interval: 5s
      timeout: 3s
      retries: 10
volumes:
  trading_ai_postgres:

